<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0d9488" />
    <title>Islam pro</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="mobile-app">
      <header class="topbar">
        <h1>Islam pro</h1>
        <p id="today"></p>
        <strong id="clock"></strong>
      </header>

      <main>
        <section class="screen active" id="screen-home">
          <article class="card">
            <h2>Horaires de prière</h2>
            <ul id="prayer-times"></ul>
            <p id="next-prayer"></p>
          </article>

          <article class="card">
            <h2>Hadith du jour</h2>
            <blockquote id="hadith"></blockquote>
            <button id="refresh-hadith" class="btn">Changer</button>
          </article>

          <article class="card">
            <h2>Verset du jour</h2>
            <blockquote id="verse"></blockquote>
          </article>
        </section>

        <section class="screen" id="screen-audio">
          <article class="card">
            <h2>Podcasts</h2>
            <audio controls preload="none">
              <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg" />
            </audio>
          </article>

          <article class="card">
            <h2>Histoires pour dormir</h2>
            <audio controls preload="none">
              <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg" />
            </audio>
          </article>

          <article class="card">
            <h2>Histoires du Prophète ﷺ</h2>
            <audio controls preload="none">
              <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3" type="audio/mpeg" />
            </audio>
          </article>
        </section>

        <section class="screen" id="screen-calendar">
          <article class="card">
            <h2>Calendrier & fêtes</h2>
            <ul id="events"></ul>
          </article>

          <article class="card">
            <h2>Lien sécurisé</h2>
            <button id="generate-link" class="btn">Générer</button>
            <code id="secure-link"></code>
          </article>
        </section>
      </main>

      <nav class="bottom-tabs">
        <button class="tab active" data-target="home">Accueil</button>
        <button class="tab" data-target="audio">Audio</button>
        <button class="tab" data-target="calendar">Calendrier</button>
      </nav>
    </div>

    <script src="app.js"></script>
  </body>
</html>
