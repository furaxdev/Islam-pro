services:
  # API — Hono (Node + TypeScript). Runs from the pnpm workspace root.
  - type: web
    name: islam-pro-api
    runtime: node
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter @islam-pro/api start
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: islampro
      - key: NODE_VERSION
        value: 22.17.0

  # Mobile app exported as static web. Built from the pnpm workspace root.
  - type: web
    name: islam-pro-frontend
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @islam-pro/mobile exec expo export --platform web
    staticPublishPath: apps/mobile/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        fromService:
          type: web
          name: islam-pro-api
          property: host
